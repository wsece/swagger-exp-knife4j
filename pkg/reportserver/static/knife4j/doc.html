      const target = window.__KNIFE4J_TARGET_ORIGIN__;
      const legacyPrefix = "/knife4j/" + session;
      const specPath = "/knife4j-openapi.json?session=" + encodeURIComponent(session);
      const configPath = "/knife4j-swagger-config?session=" + encodeURIComponent(session);
      const stripLegacyRe = new RegExp("/knife4j/" + session.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "(?=/|$)", "g");
      const stripAnyKnifeRe = /\/knife4j\/[^/?#\s]+(?=\/|$)/g;

      function isLocalStatic(path) {
        return path.includes("/webjars/") || path.includes("/knife4j-assets/");
      }

      function isBootstrapPath(path) {
        return path.includes("swagger-config") || path.includes("swagger-resources")
          || path.includes("knife4j-openapi") || path.includes("knife4j-swagger-config")
          || path.endsWith("/v3/api-docs");
      }

      function isReportServerPath(path) {
        if (!path || path === "/" || path === "/knife4j-doc.html") return true;
        if (path.startsWith("/knife4j")) return true;
        if (path.startsWith("/webjars/")) return true;
        if (path.startsWith("/v3/")) return true;
        if (isBootstrapPath(path)) return true;
        // Only our report REST API — do NOT match target APIs like /api/test/ok

        if (path.indexOf("/api/sessions") === 0) return true;
        if (path.indexOf("/api/docs") === 0) return true;
        if (path.indexOf("/api/records") === 0) return true;
        return false;

      const tryPrefix = legacyPrefix + "/try";

      function toProxyApiUrl(pathname, search) {
        var apiPath = pathname || "/";
        if (!apiPath.startsWith("/")) apiPath = "/" + apiPath;
        return location.origin + tryPrefix + apiPath + (search || "");

      function isTargetOriginUrl(u) {
        if (!target || !u) return false;
        try {
          const t = new URL(target);
          return u.origin === t.origin;
        } catch (e) {
          return false;

      function stripDisplayPath(text) {
        if (!text) return text;
        let s = text.replace(stripLegacyRe, "");
        s = s.replace(stripAnyKnifeRe, "");
        if (s.startsWith("//")) s = s.slice(1);
        return s;

      function rewriteUrl(url) {
        if (!url || typeof url !== "string") return url;
        let u;
        try {
          u = new URL(url, location.origin);
        } catch (e) {

        if (isTargetOriginUrl(u)) {
          return toProxyApiUrl(u.pathname, u.search);

          for (let i = 0; i < stripPrefixes.length; i++) {

              let apiPath = path.slice(pre.length);

        }

      window.fetch = function (input, init) {
