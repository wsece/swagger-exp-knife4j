services:
  report:
    build: .
    image: swagger-exp-knife4j:latest
    container_name: swagger-exp-knife4j-report
    ports:
      - "${REPORT_PORT:-7171}:7171"
    volumes:
      - swagger-data:/data
    command:
      - report
      - server
      - --host
      - "0.0.0.0"
      - --port
      - "7171"
      - --db-uri
      - sqlite://swagger-scan.sqlite3
      - --api-doc-path
      - ./output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:7171/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  swagger-data:
    name: swagger-exp-knife4j-data
